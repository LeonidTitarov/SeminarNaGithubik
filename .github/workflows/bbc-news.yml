name: BBC News Mail

on:
  schedule:
    - cron: "0 7 * * *"  # každý den v 7:00
  workflow_dispatch:

jobs:
  news:
    runs-on: ubuntu-latest

    steps:
      - name: Fetch BBC news
        run: |
          NEWS=$(curl -s https://feeds.bbci.co.uk/news/rss.xml | grep "<title>" | head -n 5 | sed 's/<[^>]*>//g')
          echo "NEWS<<EOF" >> $GITHUB_ENV
          echo "$NEWS" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Send email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: BBC zprávy dne
          body: ${{ env.NEWS }}
          to: leonida.titarov@gmail.com
          from: ${{ secrets.EMAIL_USERNAME }}